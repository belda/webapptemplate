{% extends "layouts/auth.html" %}

{% block auth_title %}Password updated{% endblock %}

{% block auth_content %}
<div class="text-center">
  <div class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-full bg-green-100">
    <svg class="h-6 w-6 text-green-600" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
    </svg>
  </div>
  <p class="text-sm text-gray-600">Your password has been updated. You can now sign in with your new password.</p>
  <a href="{% url 'account_login' %}" class="btn-primary mt-6 inline-block">Sign in</a>
</div>
{% endblock %}
