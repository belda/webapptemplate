{% extends "layouts/auth.html" %}

{% block auth_title %}Check your email{% endblock %}

{% block auth_content %}
<div class="text-center">
  <div class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-full bg-primary-100">
    <svg class="h-6 w-6 text-primary-600" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
    </svg>
  </div>
  <p class="text-sm text-gray-600">
    We've sent a confirmation link to your email address. Please click the link to activate your account.
  </p>
  <p class="mt-3 text-sm text-gray-500">
    Didn't receive it? Check your spam folder or
    <a href="{% url 'account_email_verification_sent' %}" class="font-medium text-primary-600 hover:text-primary-500">request a new link</a>.
  </p>
</div>
{% endblock %}
