{% extends "base.html" %}

{% block body %}
<div class="h-full flex"
     x-data="{
       sidebarCollapsed: JSON.parse(localStorage.getItem('sidebarCollapsed') || 'false'),
       mobileSidebarOpen: false,
       toggleDesktop() {
         this.sidebarCollapsed = !this.sidebarCollapsed;
         localStorage.setItem('sidebarCollapsed', this.sidebarCollapsed);
       }
     }">

  <!-- Mobile overlay (tap to close) -->
  <div x-show="mobileSidebarOpen"
       @click="mobileSidebarOpen = false"
       class="fixed inset-0 z-40 bg-gray-900/80 lg:hidden"
       x-cloak></div>

  <!-- Sidebar -->
  {% include "components/sidebar.html" %}

  <!-- Main content -->
  <div class="flex flex-1 flex-col min-w-0 w-0">

    <!-- Mobile topbar: hamburger to open sidebar -->
    <div class="flex h-16 shrink-0 items-center justify-between border-b border-gray-700 bg-gray-900 px-3 lg:hidden">
      <!-- Logo (fixed) + app name (shrinkable) -->
      <div class="flex items-center gap-x-3 min-w-0 overflow-hidden mr-2">
        <div class="shrink-0">{% include "components/app_logo.html" %}</div>
        <span class="text-white font-semibold text-sm truncate">{{ APP_NAME }}</span>
      </div>
      <!-- Hamburger (fixed) -->
      <button type="button"
              class="flex shrink-0 items-center justify-center h-8 w-8 rounded-md text-gray-400 hover:text-white hover:bg-gray-800 transition-colors"
              @click="mobileSidebarOpen = true">
        <i class="fa-solid fa-bars fa-fw"></i>
      </button>
    </div>

    <!-- Page content -->
    <main class="flex-1 overflow-y-auto overflow-x-hidden">
      <div class="{% block content_class %}py-8 px-4 sm:px-6 lg:px-8{% endblock %}">
        {% include "components/messages.html" %}
        {% block content %}{% endblock %}
      </div>
    </main>

  </div>
</div>
{% endblock %}
