<form hx-post="{% url 'workspace_create' %}"
      hx-target="body"
      hx-push-url="true">
  {% csrf_token %}
  <div>
    <label for="{{ form.name.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
      Workspace name
    </label>
    {{ form.name }}
    {% if form.name.errors %}
    <p class="mt-1 text-xs text-red-600">{{ form.name.errors.0 }}</p>
    {% endif %}
  </div>
  <div class="mt-4 flex gap-x-2 justify-end">
    <button type="submit" class="btn-primary">Create</button>
  </div>
</form>
